name: Claude Sync
on:
  push:
    paths:
      - 'claude-inbox/**'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply inbox updates to src/
        run: |
          set -e
          CHANGED=0
          for f in claude-inbox/*.ts claude-inbox/*.tsx; do
            [ -f "$f" ] || continue
            # First line is: // dest: src/path/to/file.tsx
            dest=$(head -1 "$f" | sed 's|// dest: ||')
            if [ -z "$dest" ] || [ "$dest" = "$(head -1 "$f")" ]; then
              echo "Skipping $f — no dest header"
              continue
            fi
            mkdir -p "$(dirname "$dest")"
            tail -n +2 "$f" > "$dest"
            echo "Wrote $f -> $dest"
            CHANGED=1
          done
          if [ "$CHANGED" = "1" ]; then
            git config user.email "soleyromit@gmail.com"
            git config user.name "Romit Soley"
            git add src/
            git commit -m "data: Claude auto-sync $(date +%Y-%m-%d)"
            git push
            echo "Pushed src/ changes"
          else
            echo "No valid inbox files found"
          fi

      - name: Trigger deploy
        if: success()
        run: echo "Deploy workflow will trigger automatically on the push above"
