name: Claude Sync
on:
  push:
    paths:
      - 'claude-inbox/**'
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v1
        id: token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - uses: actions/checkout@v4
        with:
          token: ${{ steps.token.outputs.token }}
      - name: Apply inbox updates
        run: |
          for f in claude-inbox/*.ts claude-inbox/*.tsx; do
            [ -f "$f" ] || continue
            dest=$(cat "$f" | head -1 | sed 's|// dest: ||')
            tail -n +2 "$f" > "$dest"
            echo "Wrote $dest"
          done
          git config user.email "claude@rr-insights"
          git config user.name "Claude Sync"
          git add src/
          git commit -m "data: Claude auto-sync" || echo "nothing to commit"
          git push
