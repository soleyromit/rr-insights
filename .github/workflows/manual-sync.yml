# ─────────────────────────────────────────────────────────────────────────────
# manual-sync.yml
# Triggered by Claude via GitHub API (workflow_dispatch) OR manually.
# No container token needed — Claude calls the GitHub API with your PAT
# which is stored as a repo secret (GITHUB_TOKEN is always available).
# ─────────────────────────────────────────────────────────────────────────────
name: Manual sync + deploy

on:
  workflow_dispatch:
    inputs:
      commit_message:
        description: 'Commit message'
        required: false
        default: 'feat: rr-insights sync via GitHub Actions'
      files_changed:
        description: 'Which files were updated (informational)'
        required: false
        default: 'data/insights.ts, ExamManagementView.tsx'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run build

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: sync-and-deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
