name: Deploy Insight Hub
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to gh-pages via git push
        run: |
          cd dist
          touch .nojekyll
          git init
          git config user.email "soleyromit@gmail.com"
          git config user.name "Romit Soley"
          git add -A
          git commit -m "deploy: $(date -u '+%Y-%m-%d %H:%M UTC') from ${{ github.sha }}"
          git push --force \
            https://soleyromit:${{ secrets.GITHUB_TOKEN }}@github.com/soleyromit/rr-insights.git \
            HEAD:gh-pages
